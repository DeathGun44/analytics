query MERGED_PR_QUERY($owner:String!, $repo:String!, $cursor:String) {
  repository(owner:$owner, name:$repo) {
    pullRequests(
      first:100
      after:$cursor
      states:MERGED
      orderBy:{field:UPDATED_AT, direction:DESC}
    ) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        number
        createdAt
        mergedAt

        author {
          login
        }

        additions
        deletions
        changedFiles
        closingIssuesReferences(first:10) {
          nodes {
            number
            labels(first:10) {
              nodes {
                name
              }
            }
          }
        }
      }
    }
  }
  rateLimit{
    limit
    remaining
    cost
    resetAt
  }
}